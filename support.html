<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyLinx - Cities Skylines Mods</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans">
    <link rel="icon" href="https://i.imgur.com/Nbbu7Hl.png" type="image/png">
    <style>
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            background-color: #f0f0f0; /* Set a background color */
        }

        .container {
            position: fixed;
            top: 0;
            right: 0;
        }

        .icon {
            width: 50px;
            height: 50px;
            background-image: url("https://i.imgur.com/Nbbu7Hl.png");
            background-size: cover;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        .navbar {
            background-color: #333;
            overflow: hidden;
        }

            .navbar a {
                float: left;
                display: block;
                color: white;
                text-align: center;
                padding: 14px 16px;
                text-decoration: none;
            }

                .navbar a:hover {
                    background-color: #ddd;
                    color: black;
                }

        /* Style the "Support" button */
        .support-button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }

        /* Discord server information */
        .discord-info {
            background-color: #3498db;
            color: white;
            padding: 20px;
            border-radius: 5px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html">Mods</a>
        <a href="support.html">Support</a>
    </div>

    <div class="container">
        <div class="icon"></div>
    </div>

    <!-- Discord server information -->
    <div class="discord-info">
        <h2>Nyoko's Server</h2>
        <p>Get help, share your ideas, and stay updated on the latest mods and community discussions.</p>
        <!-- Add your Discord server widget or invitation link here -->
        <a href="https://discord.gg/GqGbeUD8Dg" target="_blank">Discord Invite</a>
    </div>
</body>
</html>
