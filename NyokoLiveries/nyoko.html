<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYOKO Liveries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Inter',sans-serif;
background:#0a0a0a;
color:white;
}

/* BRAND HEADER */

.brand-top{
font-size:42px;
font-weight:800;
letter-spacing:6px;
margin-bottom:10px;
}

.brand-top span{
opacity:.6;
}

.brand-desc{
max-width:520px;
font-size:14px;
opacity:.6;
margin-bottom:30px;
line-height:1.6;
}

/* HERO UPDATE */

.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(180deg,#000,#111);
padding:40px;
}

.hero-logo{
width:360px;
max-width:80%;
background:white;
padding:26px;
border-radius:14px;
box-shadow:0 25px 60px rgba(0,0,0,.6);
margin-top:10px;
}

/* SEARCH */

.search-container{
max-width:800px;
margin:40px auto;
padding:0 20px;
}

.search-box{
width:100%;
padding:16px 20px;
border-radius:40px;
border:none;
background:#111;
color:white;
font-size:16px;
outline:none;
}

/* GALLERY */

.gallery{
max-width:1400px;
margin:auto;
padding:40px 30px 70px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:40px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
transition:transform .35s ease;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:24px;
}

.livery-name{
font-size:20px;
font-weight:600;
margin-bottom:8px;
}

.badge{
display:inline-block;
font-size:12px;
font-weight:600;
padding:4px 10px;
border-radius:20px;
margin-right:6px;
margin-bottom:6px;
}

.catalog-title{
text-align:center;
font-size:28px;
font-weight:800;
letter-spacing:6px;
margin-top:40px;
opacity:.9;
}

.badge-msfs{background:#0f4cff;}
.badge-xp12{background:#00c853;}
.badge-xp11{background:#ff6d00;}
.badge-cs2{background:#856a56;}

.aircraft{
font-size:14px;
opacity:.6;
}

.download{
display:inline-block;
margin-top:16px;
font-size:14px;
font-weight:600;
color:white;
text-decoration:none;
border-bottom:2px solid white;
padding-bottom:3px;
}

.footer{
text-align:center;
padding:40px;
opacity:.5;
font-size:13px;
}

</style>
</head>

<body>

<section class="hero">

<div class="brand-top">
SKYLINX | NYOKO
</div>

<p class="brand-desc">
Aircraft liveries for X-Plane, Cities: Skylines II and Microsoft Flight Simulator.
Designed by Nyoko for you.
</p>

<img src="nyoko.png" class="hero-logo">

</section>

<div class="catalog-title">
CATALOG
</div>

<div class="search-container">
<input type="text" class="search-box" id="searchInput" placeholder="Search liveries...">
</div>

<section class="gallery" id="gallery"></section>

<div class="footer">
Nyoko Liveries • 
</div>

<script>

async function loadCSV(){

const response = await fetch("liveries.csv");
const data = await response.text();

const rows = data.split("\n").slice(1);
const gallery = document.getElementById("gallery");

rows.forEach(row=>{

if(!row.trim()) return;

const cols = row.split(",");

let image = cols[0];
let title = cols[1];
let aircraft = cols[2];
let sims = cols[3].split("|");
let link = cols[4];

let badges="";

sims.forEach(sim=>{

sim=sim.trim();

if(sim==="MSFS2020")
badges+=`<span class="badge badge-msfs">MSFS 2020</span>`;

if(sim==="X-Plane 12")
badges+=`<span class="badge badge-xp12">X-Plane 12</span>`;

if(sim==="X-Plane 11")
badges+=`<span class="badge badge-xp11">X-Plane 11</span>`;

if(sim==="CS2")
badges+=`<span class="badge badge-cs2">Cities: Skylines II</span>`;

});

gallery.innerHTML+=`
<div class="card">
<img src="${image}">
<div class="card-content">
<div class="livery-name">${title}</div>
${badges}
<div class="aircraft">${aircraft}</div>
<a class="download" href="${link}" target="_blank">Download</a>
</div>
</div>
`;

});

}

loadCSV();

/* SEARCH */

document.getElementById("searchInput").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let text=card.innerText.toLowerCase();
card.style.display=text.includes(filter)?"block":"none";
});

});

</script>

</body>
</html>
